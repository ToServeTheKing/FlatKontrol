id: io.github.toservetheking.FlatKontrol
runtime: org.kde.Platform
# Use the latest Flathub KDE runtime available at submission time.
runtime-version: '6.10'
sdk: org.kde.Sdk
command: flatkontrol

# Permissions mirror Flatseal's published manifest exactly - the accepted shape
# for a Flatpak-permissions manager. No --filesystem=host, no --socket=session-bus,
# no wildcard --talk-name, no --device=all.
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Read installed apps' metadata (system + user installations).
  - --filesystem=/var/lib/flatpak/app:ro
  - --filesystem=xdg-data/flatpak/app:ro
  # Read/write the per-app and global override files.
  - --filesystem=xdg-data/flatpak/overrides:create
  # Edit dynamic portal permissions.
  - --talk-name=org.freedesktop.impl.portal.PermissionStore

cleanup:
  - /include
  - /lib/pkgconfig
  - '*.a'

modules:
  - name: flatkontrol
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      # For Flathub / release builds, pin to a tag AND commit:
      - type: git
        url: https://github.com/toservetheking/FlatKontrol.git
        tag: v0.2.0
        # commit: <fill in the exact commit SHA the tag points at>
      #
      # For local testing before the repo is pushed, replace the source above with:
      #   - type: dir
      #     path: .
